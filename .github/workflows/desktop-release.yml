name: Desktop Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  desktop-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Desktop syntax check
        run: npm run desktop:check

  detect-version-change:
    runs-on: ubuntu-latest
    needs: desktop-checks
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      current_version: ${{ steps.version.outputs.current_version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version change
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"
          previous_version=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            previous_version="$(git show HEAD^:package.json | node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(p.version || '')" 2>/dev/null || true)"
          fi
          changed="false"
          if [[ -n "$previous_version" && "$current_version" != "$previous_version" ]]; then
            changed="true"
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "Current version: $current_version"
          echo "Previous version: $previous_version"
          echo "Version changed: $changed"

  publish-desktop:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            publish_script: desktop:release:win
          - os: macos-latest
            platform: macos
            publish_script: desktop:release:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate Windows signing secrets
        if: matrix.platform == 'windows'
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          [[ -n "$WIN_CSC_LINK" ]] || { echo "Missing required secret: WIN_CSC_LINK"; exit 1; }
          [[ -n "$WIN_CSC_KEY_PASSWORD" ]] || { echo "Missing required secret: WIN_CSC_KEY_PASSWORD"; exit 1; }

      - name: Validate macOS signing and notarization secrets
        if: matrix.platform == 'macos'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [[ -n "$CSC_LINK" ]] || { echo "Missing required secret: CSC_LINK"; exit 1; }
          [[ -n "$CSC_KEY_PASSWORD" ]] || { echo "Missing required secret: CSC_KEY_PASSWORD"; exit 1; }
          [[ -n "$APPLE_ID" ]] || { echo "Missing required secret: APPLE_ID"; exit 1; }
          [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]] || { echo "Missing required secret: APPLE_APP_SPECIFIC_PASSWORD"; exit 1; }
          [[ -n "$APPLE_TEAM_ID" ]] || { echo "Missing required secret: APPLE_TEAM_ID"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Publish desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run ${{ matrix.publish_script }}

  skip-publish:
    runs-on: ubuntu-latest
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed != 'true'
    steps:
      - name: Skip publish (no version bump)
        run: echo "No package.json version bump detected. Skipping desktop publish."
