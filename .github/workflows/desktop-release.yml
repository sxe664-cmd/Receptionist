name: Desktop Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  desktop-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Desktop syntax check
        run: npm run desktop:check

  detect-version-change:
    runs-on: ubuntu-latest
    needs: desktop-checks
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      current_version: ${{ steps.version.outputs.current_version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version change
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"
          previous_version=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            previous_version="$(git show HEAD^:package.json | node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(p.version || '')" 2>/dev/null || true)"
          fi
          changed="false"
          if [[ -n "$previous_version" && "$current_version" != "$previous_version" ]]; then
            changed="true"
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "Current version: $current_version"
          echo "Previous version: $previous_version"
          echo "Version changed: $changed"

  publish-desktop:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            publish_script: desktop:release:win
          - os: macos-latest
            platform: macos
            publish_script: desktop:release:mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Signing status
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            if [[ -n "$WIN_CSC_LINK" && -n "$WIN_CSC_KEY_PASSWORD" ]]; then
              echo "Windows signing secrets detected."
            else
              echo "Windows signing secrets missing; publishing unsigned installer."
            fi
          fi
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" && -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
              echo "macOS signing/notarization secrets detected."
            else
              echo "macOS signing/notarization secrets missing; publishing unsigned/unnotarized installer."
            fi
          fi

      - name: Require embedded OAuth client secret
        shell: bash
        env:
          DESKTOP_GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.DESKTOP_GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          if [[ -z "$DESKTOP_GOOGLE_OAUTH_CLIENT_JSON" ]]; then
            echo "Missing required secret: DESKTOP_GOOGLE_OAUTH_CLIENT_JSON"
            exit 1
          fi

      - name: Write embedded OAuth client JSON
        shell: bash
        env:
          DESKTOP_GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.DESKTOP_GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          mkdir -p desktop/oauth
          printf '%s' "$DESKTOP_GOOGLE_OAUTH_CLIENT_JSON" > desktop/oauth/google-calendar-oauth-client.json

      - name: Install dependencies
        run: npm ci

      - name: Publish desktop release (Windows)
        if: matrix.platform == 'windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run ${{ matrix.publish_script }}

      - name: Publish desktop release (macOS)
        if: matrix.platform == 'macos'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.publish_script }}

  skip-publish:
    runs-on: ubuntu-latest
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed != 'true'
    steps:
      - name: Skip publish (no version bump)
        run: echo "No package.json version bump detected. Skipping desktop publish."
