# Structured reminder contacts for appointment reminders.
# Calendar events define appointment times; this file defines who may receive
# email/SMS reminders and whether SMS consent exists.
contacts:
  - recipient_id: "sample-patient"
    display_name: "Sample Patient"
    email: "patient@example.com"
    phone: "+15551234567"
    preferred_channels: ["email", "sms"]
    sms_consent_status: "opted_in"       # unknown | opted_in | opted_out
    consent_source: "paper intake form"
    consent_timestamp: "2026-01-01T00:00:00Z"
    suppressed: false
    match_keys:
      - "patient@example.com"            # attendee email / app-specific key

