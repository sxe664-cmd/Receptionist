# config/businesses/example-dental.yaml
#
# YAML INDENTATION TIP — read before uncommenting any "# section:" block:
#   Top-level keys (business, voice, hours, recording, sip, calendar, etc.)
#   MUST start at column 0. When uncommenting a commented example, remove
#   BOTH the leading "#" AND the space that follows it; otherwise YAML
#   sees the section as nested under the previous block and you'll get a
#   cryptic "expected <block end>, but found '<block mapping start>'"
#   error at config load.
#
#   Wrong (one leading space → parser error):
#       sip:
#         transfer_uri_template: "sip:{number}"
#
#   Right (column 0 → loads cleanly):
#     sip:
#       transfer_uri_template: "sip:{number}"

# mode:
#   demo       = safe local mode; fake reminder email/SMS providers are allowed.
#   production = live mode; fake reminder email/SMS providers are rejected at config load.
mode: "demo"

business:
  name: "Acme Dental"
  type: "dental office"
  timezone: "America/New_York"

# Change common outward-facing values here first.
# - default_transfer_number is used by any routing entry without its own number.
# - email_from is used by email.from if email.from is omitted.
# - sms_from_number is used by Twilio SMS if sms.provider.from_number is omitted.
communications:
  default_transfer_number: "+15551234567"
  email_from: "Acme Dental <receptionist@acmedental.com>"
  sms_from_number: "+15557654321"


# Optional operator-editable confirmation/reminder copy. The desktop console
# can edit these without touching the rest of this YAML. Leave any field blank
# or remove it to use the built-in default. Available placeholders:
# {business_name}, {recipient_name}, {appointment_time}, {offset_days},
# {default_transfer_number}
message_templates:
  confirmation_email_subject: "Appointment confirmed: {appointment_time}"
  confirmation_email_text: |
    Hi {recipient_name},

    Your appointment with {business_name} is confirmed for {appointment_time}.

    If you need to make changes, please call us at {default_transfer_number}.
  confirmation_sms: "{business_name}: your appointment is confirmed for {appointment_time}. Reply STOP to opt out. Reply HELP for help."
  reminder_email_subject: "Appointment reminder: {appointment_time}"
  reminder_email_text: |
    Hi {recipient_name},

    This is a reminder from {business_name} about your appointment on {appointment_time}.

    If you need to make changes, please call us at {default_transfer_number}.
  reminder_sms: "{business_name}: reminder for your appointment on {appointment_time}. Reply STOP to opt out. Reply HELP for help."

voice:
  voice_id: "marin"              # OpenAI Realtime voice; "marin"/"cedar" are trained for gpt-realtime-1.5
  model: "gpt-realtime-1.5"      # options: gpt-realtime, gpt-realtime-1.5, gpt-realtime-mini
  # auth:
  #   type: "api_key"             # reads OPENAI_API_KEY by default
  #   # OR: type: "oauth_codex" with path: "./secrets/example-dental/openai_auth.json"
  # idle:
  #   silence_hangup_enabled: true
  #   away_seconds: 15
  #   silence_grace_seconds: 30
  #   absolute_silence_seconds: 120
  #   max_call_duration_seconds: 900

languages:
  primary: "en"
  allowed: ["en", "es"]

greeting: "Thank you for calling Acme Dental, how can I help you today?"

personality: |
  You are a warm, professional receptionist for a dental office.
  Be concise but friendly. If you don't know something, offer to
  take a message or transfer to the office manager.

hours:
  monday:    { open: "08:00", close: "17:00" }
  tuesday:   { open: "08:00", close: "17:00" }
  wednesday: { open: "08:00", close: "12:00" }
  thursday:  { open: "08:00", close: "17:00" }
  friday:    { open: "08:00", close: "15:00" }
  saturday:  closed
  sunday:    closed

after_hours_message: |
  Our office is currently closed. Our regular hours are Monday
  through Friday. Would you like to leave a message?

routing:
  - name: "Front Desk"
    # number omitted: uses communications.default_transfer_number
    description: "General inquiries, scheduling"
  - name: "Dr. Smith"
    number: "+15551234568"
    description: "Direct line for urgent dental issues"
  - name: "Billing"
    number: "+15551234569"
    description: "Insurance and payment questions"

faqs:
  - question: "Do you accept my insurance?"
    answer: "We accept most major dental insurance plans including Delta Dental, Cigna, Aetna, and MetLife. For other plans, we can verify your coverage when you call."
  - question: "How do I schedule an appointment?"
    answer: "I can transfer you to our front desk to schedule, or you can book online at acmedental.com/book."
  - question: "Where are you located?"
    answer: "We're at 123 Main Street, Suite 200, Springfield. Right next to the Springfield Mall."
  - question: "What should I do for a dental emergency?"
    answer: "For a dental emergency during business hours, I'll transfer you directly to Dr. Smith. After hours, please call 911 for life-threatening emergencies or visit the nearest emergency room."

# Multi-channel message delivery. Remove or comment out any channels you do not need.
messages:
  channels:
    - type: "file"
      file_path: "./messages/acme-dental/"
    # - type: "email"
    #   to: ["owner@acmedental.com"]
    #   include_transcript: true
    #   include_recording_link: true
    # - type: "webhook"
    #   url: "https://hooks.slack.com/services/..."
    #   headers:
    #     X-Api-Key: ${SLACK_TOKEN}

# Call recording via LiveKit Egress.
# To enable: remove the "# " from each line below — both the # and the space.
# recording:
#   enabled: true
#   storage:
#     type: "local"         # or "s3"
#     local:
#       path: "./recordings/acme-dental/"
#   consent_preamble:
#     enabled: true
#     text: "This call may be recorded for quality purposes."

# Call transcripts.
# To enable: remove the "# " from each line below — both the # and the space.
# transcripts:
#   enabled: true
#   storage:
#     type: "local"
#     path: "./transcripts/acme-dental/"
#   formats: ["json", "markdown"]

# Email sender (required if any email channel is enabled, or on_call_end trigger is on).
# To enable: remove the "# " from each line below — both the # and the space.
# email:
#   # from is optional when communications.email_from is set.
#   # from: "receptionist@acmedental.com"
#   sender:
#     type: "smtp"
#     smtp:
#       host: "smtp.gmail.com"
#       port: 587
#       username: ${SMTP_USERNAME}
#       password: ${SMTP_PASSWORD}
#       use_tls: true
#   triggers:
#     on_message: true
#     on_call_end: false

# Retention — days after which artifacts are swept. 0 = keep forever.
retention:
  recordings_days: 90
  transcripts_days: 90
  messages_days: 0

# SIP transfer behavior. Default works for Twilio, Telnyx, and most BYOC providers
# that translate tel-URIs to SIP. For Asterisk classic sip.conf (which rejects
# tel-URIs), uncomment the appropriate sip: form below.
# To enable: remove the "# " from each line below — both the # and the space.
# sip:
#   transfer_uri_template: "tel:{number}"            # default — Twilio/Telnyx/most BYOC
#   # transfer_uri_template: "sip:{number}"          # Asterisk classic sip.conf (DID lookup)
#   # transfer_uri_template: "sip:{number}@asterisk.local"  # remote SIP PBX

# Google Calendar integration (appointment booking). Requires setup:
# 1. Google Cloud: enable Calendar API, create a service account OR OAuth client
# 2. Share the target calendar with the service account email (for service_account auth)
# 3. Download credentials to secrets/<business-slug>/
# 4. For OAuth auth, run `python -m receptionist.booking setup <business-slug>`
# See documentation/google-calendar-setup.md for step-by-step instructions.
# To enable: remove the "# " from each line below — both the # and the space.
#
# calendar:
#   enabled: true
#   calendar_id: "primary"                 # or a specific calendar ID
#   auth:
#     type: "service_account"              # or "oauth"
#     service_account_file: "./secrets/example-dental/google-calendar-sa.json"
#     # OR:
#     # type: "oauth"
#     # oauth_token_file: "~/.aireceptionist/secrets/example-dental/google-calendar-oauth.json"
#   appointment_duration_minutes: 30
#   buffer_minutes: 15
#   buffer_placement: "after"              # "before" | "after" | "both"
#   booking_window_days: 30
#   earliest_booking_hours_ahead: 2

# Appointment confirmations and reminders.
# Confirmations are sent immediately after successful AI booking; reminders are
# sent by scheduled jobs at 4 days and 1 day before.
# Both use email + SMS when configured and allowed by contact consent.
# Calendar events provide appointment times; contacts_path provides the
# structured recipient email/phone/SMS consent. During demo-mode AI bookings,
# caller name + phone can auto-create a local contact and trigger fake
# confirmation delivery. Fake providers are safe for local tests.
# See documentation/reminders-setup.md.
# To enable: remove the "# " from each line below — both the # and the space.
#
# reminders:
#   enabled: true
#   offset_days: [4, 1]
#   channels: ["email", "sms"]
#   store_path: "./messages/reminders.sqlite3"
#   contacts_path: "./config/businesses/example-contacts.yaml"
#   lookahead_days: 60
#   allow_retroactive_send: false
#   email_provider: "fake"       # "configured" uses top-level email sender
#   fake_email_log_path: "./messages/reminders-email.log"
#   calendar_sources:
#     - type: "google"
#       calendar_id: "primary"
#     - type: "apple_ics"
#       path: "./imports/apple-calendar.ics"
#
# sms:
#   provider:
#     type: "fake"               # or "twilio"
#     log_path: "./messages/reminders-sms.log"
#     # For production Twilio:
#     # type: "twilio"
#     # from_number is optional when communications.sms_from_number is set.
#     # from_number: "+15557654321"
