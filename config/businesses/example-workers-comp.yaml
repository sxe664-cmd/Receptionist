faqs:
  - question: "Do you handle workers' compensation claims?"
    answer: "Yes, the firm handles workers' compensation matters. I can connect you with a claims representative or take an intake message."
  - question: "Can you give legal advice over the phone?"
    answer: "I can't provide legal advice. I can connect you with the right person at the firm or take a message so someone can follow up."
  - question: "What information should I have ready?"
    answer: "Helpful details include your callback number, employer, date of accident, injury, claim number if you have one, and any notices you received."
  - question: "What if my call is urgent?"
    answer: "If this is a medical emergency, please call 911. For an urgent legal or claim issue, I can try to transfer you to a claims representative or take a message for intake."

messages:
  channels:
    - type: "file"
      file_path: "./messages/example-workers-comp/"
    - type: "email"
      to: ["intake@example.com"]
      include_transcript: true
      include_recording_link: true

recording:
  enabled: true
  storage:
    type: "local"
    local:
      path: "./recordings/example-workers-comp/"
  consent_preamble:
    enabled: false
    text: ""

transcripts:
  enabled: true
  storage:
    type: "local"
    path: "./transcripts/example-workers-comp/"
  formats: ["json", "markdown"]

email:
  from: "Alex <intake@example.com>"
  sender:
    type: "resend"
    resend:
      # Set this in .env before running this example, or replace with a
      # tenant-specific env-var name in the copied local YAML.
      api_key: ${EXAMPLE_RESEND_API_KEY}
  triggers:
    on_message: true
    on_call_end: true
    on_booking: false

retention:
  recordings_days: 90
  transcripts_days: 90
  messages_days: 0

sip:
  transfer_uri_template: "tel:{number}"
