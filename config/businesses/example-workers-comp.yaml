# config/businesses/example-workers-comp.yaml
#
# Public template for a workers' compensation law firm using the
# RingCentral + Twilio + LiveKit path described in
# `documentation/ringcentral-setup.md`. Copy to a tenant-specific local
# YAML (e.g. `config/businesses/<slug>.yaml`) for deployment; any business
# YAML other than `example-*.yaml` is gitignored by design.
#
# Replace every +1555... routing placeholder with a real claims-rep DID
# before connecting live calls. The 15 entries below are obvious dummies
# so an unfinished template can never accidentally dial a real number.

business:
  name: "Example Workers' Comp Law"
  type: "workers' compensation law firm"
  timezone: "America/New_York"

voice:
  voice_id: "marin"
  model: "gpt-realtime-1.5"
  # Recommended production safety nets for long intake calls:
  # idle:
  #   absolute_silence_seconds: 120
  #   max_call_duration_seconds: 900

languages:
  primary: "en"
  allowed: ["en", "es"]

greeting: "Thank you for calling Example Workers' Comp Law, this is Alex. How can I help you today?"

personality: |
  Your name is Alex. You are the firm's phone receptionist.
  Be calm, professional, and concise. Do not provide legal advice, evaluate
  claim value, promise outcomes, or create an attorney-client relationship.
  If a caller needs legal guidance, transfer them to the appropriate claims
  representative or take a detailed message for intake.

  Do not include AI-disclosure language in the greeting or routine answers.
  If a caller asks what you can do, explain that you can route calls, answer
  basic firm questions, and take messages for the team.

  For new potential clients, collect: caller name, callback number, employer,
  date of accident, injury/body part, whether they have an existing claim
  number, and whether they have received any Workers' Compensation Board or
  insurance-carrier notices. If they do not want to provide details, take a
  shorter message and route it to intake.

hours:
  monday:    { open: "09:00", close: "17:00" }
  tuesday:   { open: "09:00", close: "17:00" }
  wednesday: { open: "09:00", close: "17:00" }
  thursday:  { open: "09:00", close: "17:00" }
  friday:    { open: "09:00", close: "17:00" }
  saturday:  closed
  sunday:    closed

after_hours_message: |
  The office is currently closed. I can take a message for intake, and someone
  from the firm will follow up during business hours.

